name: Automated Model Retraining

on:
  repository_dispatch:
    types: [trigger-retrain] # Triggered by drift detector
  workflow_dispatch: # Manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install xgboost pandas scikit-learn joblib

      - name: Run Retraining Script
        run: python src/train_model.py

      - name: Evaluate Performance
        run: |
          PRECISION=$(python src/evaluate.py)
          echo "New Model Precision: $PRECISION"
          # Check if precision is above the 95% threshold mentioned in CV
          if (( $(echo "$PRECISION < 0.95" | bc -l) )); then
            echo "Threshold not met. Aborting deployment."
            exit 1
          fi

      - name: Upload New Model
        uses: actions/upload-artifact@v3
        with:
          name: updated-fraud-model
          path: models/fraud_model.pkl
